[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "claude-mux"
version = "0.1.5"
description = "Python client for claude-mux daemon — PTY-based Claude session multiplexer over JSON-RPC."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
  { name = "glowElephant" },
]
keywords = ["claude", "pty", "mux", "ipc", "json-rpc"]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Operating System :: POSIX",
  "Operating System :: MacOS",
  "Operating System :: Microsoft :: Windows",
]
dependencies = [
  # Windows Named pipe 직접 처리용. POSIX는 stdlib socket만으로 충분.
  'pywin32; sys_platform == "win32"',
]

[project.optional-dependencies]
test = ["pytest>=7.0", "pytest-asyncio>=0.21"]

[project.urls]
Homepage = "https://github.com/glowElephant/claude-mux"
Repository = "https://github.com/glowElephant/claude-mux"
Issues = "https://github.com/glowElephant/claude-mux/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_mux"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
